<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nuclear Outage Command Center</title>
    <style>
        :root {
            --bg-dark: #1a1a1a;
            --stone: #2d2d2d;
            --ember: #ff9d00;
            --ash: #a0a0a0;
            --gold: #d4af37;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-dark);
            color: var(--ash);
            margin: 0;
            padding: 20px;
        }

        .container { max-width: 1200px; margin: auto; }

        header {
            border-bottom: 2px solid var(--stone);
            padding-bottom: 20px;
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        h1 { color: var(--ember); margin: 0; text-transform: uppercase; letter-spacing: 2px; }

        .controls {
            background: var(--stone);
            padding: 20px;
            border-radius: 8px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
            border-left: 4px solid var(--gold);
        }

        label { display: block; margin-bottom: 8px; font-weight: bold; color: var(--gold); }

        select, input, button {
            width: 100%;
            padding: 10px;
            background: #111;
            border: 1px solid #444;
            color: white;
            border-radius: 4px;
        }

        button {
            background: var(--ember);
            color: black;
            font-weight: bold;
            cursor: pointer;
            border: none;
            transition: 0.3s;
            margin-top: 24px;
        }

        button:hover { background: var(--gold); transform: translateY(-2px); }

        table {
            width: 100%;
            border-collapse: collapse;
            background: var(--stone);
            border-radius: 8px;
            overflow: hidden;
        }

        th { background: #222; color: var(--gold); text-align: left; padding: 15px; border-bottom: 2px solid #444; }
        td { padding: 12px 15px; border-bottom: 1px solid #333; }
        tr:hover { background: #353535; }

        .status { font-style: italic; color: var(--ember); margin-top: 10px; height: 20px; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Nuclear Outages <span style="font-weight: 200;">| Command Center</span></h1>
    </header>

    <div class="controls">
        <div>
            <label for="dataset">Target Dataset</label>
            <select id="dataset" onchange="fetchData()">
                <option value="facility-nuclear-outages">Facility Level Outages</option>
                <option value="generator-nuclear-outages">Generator Level Outages</option>
                <option value="us-nuclear-outages">U.S. National Summary</option>
            </select>
        </div>
        <div>
            <label for="period">Filter by Date</label>
            <input type="date" id="period" onchange="fetchData()">
        </div>
        <div>
            <button onclick="fetchData()">Query Database</button>
        </div>
        <div>
            <button id="refreshBtn" onclick="triggerRefresh()">🔥 Trigger Pipeline</button>
            <div id="statusMsg" class="status"></div>
        </div>
    </div>

    <table id="dataTable">
        <thead id="tableHead"></thead>
        <tbody id="tableBody"></tbody>
    </table>
</div>

<script>
    const API_BASE = "http://localhost:8000";

    async function fetchData() {
        const dataset = document.getElementById('dataset').value;
        const period = document.getElementById('period').value;
        const body = document.getElementById('tableBody');
        const head = document.getElementById('tableHead');

        // if there is nothing in the HTML, stop
        if (!body || !head) return;

        body.innerHTML = '<tr><td colspan="5" style="text-align:center; padding: 40px;">Searching...</td></tr>';

        try {
            let url = `${API_BASE}/data?dataset=${dataset}`;
            if (period) url += `&period=${period}`;
            
            const response = await fetch(url);
            if (!response.ok) {
            throw new Error(`Server responded with ${response.status}`);
            }
            const data = await response.json();

            //empty database
            if (!data || data.length === 0) { 
            head.innerHTML = '';
            body.innerHTML = `
                <tr>
                    <td colspan="5" style="text-align: center; padding: 60px; border: 1px solid var(--stone);">
                        <div style="color: var(--gold); font-size: 1.2em;">The archives are empty for this date.</div>
                        <div style="color: var(--ash); margin-top: 5px;">Try a different date or trigger the pipeline.</div>
                    </td>
                </tr>`;
            return;
        }

            renderTable(data, dataset);
        } catch (err) { //network errors
            console.error("Pipeline Error:", err);
            head.innerHTML = '';
            body.innerHTML = `
            <tr>
                <td colspan="5" style="text-align: center; padding: 50px; color: var(--ember);">
                    <strong>System Error</strong><br>
                    <small>${err.message}</small>
                </td>
            </tr>`;
        }
    }

    function renderTable(data, dataset) {
        if (!data || data.length === 0) {
    body.innerHTML = `
        <tr>
            <td colspan="5" style="text-align: center; padding: 60px;">
                <div style="color: var(--gold); font-size: 1.2em;">The archives are empty.</div>
                <div style="color: var(--ash); margin-top: 5px;">Trigger the pipeline to populate this dataset.</div>
            </td>
        </tr>`;
    return;
}
        const head = document.getElementById('tableHead');
        const body = document.getElementById('tableBody');
        head.innerHTML = '';
        body.innerHTML = '';

        if (!data || data.length === 0) {
            body.innerHTML = '<tr><td colspan="5">No data found for this selection.</td></tr>';
            return;
        }

        // 1. DYNAMIC HEADERS
        let headers = ['Period'];
        if (dataset !== 'us-nuclear-outages') headers.push('Plant Name');
        if (dataset === 'generator-nuclear-outages') headers.push('Generator');
        headers.push('Outage (MW)');

        let headerRow = '<tr>';
        headers.forEach(h => headerRow += `<th>${h}</th>`);
        head.innerHTML = headerRow + '</tr>';

        // 2. DYNAMIC ROWS
        data.forEach(row => {
            let rowHtml = `<tr><td>${row.period}</td>`;
            if (dataset !== 'us-nuclear-outages') rowHtml += `<td>${row.plant_name}</td>`;
            if (dataset === 'generator-nuclear-outages') rowHtml += `<td>${row.generator || 'N/A'}</td>`;
            rowHtml += `<td>${row.outage.toLocaleString()}</td></tr>`;
            body.innerHTML += rowHtml;
        });
    }

    async function triggerRefresh() {
        const dataset = document.getElementById('dataset').value;
        const msg = document.getElementById('statusMsg');
        msg.innerText = "Pipeline started in background...";
        
        try {
            await fetch(`${API_BASE}/refresh?dataset=${dataset}`, { method: 'POST' });
            setTimeout(() => {
                msg.innerText = "Pipeline has probably finished. Click Query to update.";
            }, 10000);
        } catch (err) {
            msg.innerText = "Error triggering pipeline.";
        }
    }

    // Initial load
    fetchData();
</script>

</body>
</html>
