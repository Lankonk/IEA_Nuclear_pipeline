<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cinder Outage Monitor | IEANuclear</title>
    <style>
        :root {
            --bg-primary: #1a1a1a;
            --bg-secondary: #252525;
            --accent: #d4af37;
            --text-main: #e0e0e0;
            --text-dim: #a0a0a0;
            --danger: #8b0000;
        }

        body {
            font-family: 'Segoe UI', serif;
            background-color: var(--bg-primary);
            color: var(--text-main);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            width: 100%;
            padding: 2rem 0;
            text-align: center;
            border-bottom: 2px solid var(--accent);
            background: linear-gradient(to bottom, #111, var(--bg-primary));
        }

        h1 {
            margin: 0;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: var(--accent);
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }

        .container {
            width: 90%;
            max-width: 1200px;
            margin-top: 2rem;
        }

        /* Controls Section */
        .controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--bg-secondary);
            padding: 1.5rem;
            border-radius: 4px;
            border: 1px solid #333;
            margin-bottom: 2rem;
        }

        select, button {
            background: #111;
            color: var(--text-main);
            border: 1px solid var(--accent);
            padding: 0.8rem 1.2rem;
            cursor: pointer;
            font-size: 1rem;
            transition: 0.3s;
        }

        button:hover {
            background: var(--accent);
            color: black;
        }

        button:disabled {
            border-color: #555;
            color: #555;
            cursor: not-allowed;
        }

        /* Data Table */
        table {
            width: 100%;
            border-collapse: collapse;
            background: var(--bg-secondary);
        }

        th, td {
            text-align: left;
            padding: 1rem;
            border-bottom: 1px solid #333;
        }

        th {
            background-color: #111;
            color: var(--accent);
            text-transform: uppercase;
            font-size: 0.9rem;
        }

        tr:hover {
            background-color: #2a2a2a;
        }

        .loading-overlay {
            display: none;
            color: var(--accent);
            font-style: italic;
        }
    </style>
</head>
<body>

<header>
    <h1>Nuclear Outage Pipeline</h1>
        <button onclick="window.location.href='/dashboard'" 
                style="position: absolute; top: 20px; left: 20px; font-size: 0.8rem; border-radius: 20px;">
            ← Back to Command Center
        </button>
</header>

<div class="container">
    <div class="controls">
        <div>
            <label for="facilitySelect">Plant:</label>
            <select id="facilitySelect" onchange="updateDashboard()">
                <option value="facility-nuclear-outages">All Facilities</option>
                </select>
        </div>

        <div id="status">
            <button id="refreshTableBtn" onclick="updateDashboard()" style="background: var(--bg-secondary); border: 1px solid var(--accent); margin-right: 10px;">Refresh Table</button>
        </div>
    </div>

    <table id="outageTable">
        <thead>
            <tr>
                <th>Period</th>
                <th>Facility Name</th>
                <th>Outage (MW)</th>
            </tr>
        </thead>
        <tbody id="tableBody">
            </tbody>
    </table>
</div>

<script>
    const API_BASE = "http://localhost:8000";

    // Loads the dropdown list
    async function loadMetadata() {
        try {
            const response = await fetch(`${API_BASE}/facilities`);
            const facilities = await response.json();
            const select = document.getElementById('facilitySelect');
            facilities.forEach(f => {
                const opt = document.createElement('option');
                opt.value = f.facility_id;
                opt.innerHTML = f.plant_name;
                select.appendChild(opt);
            });
        } catch (err) { console.error("Metadata sync failed:", err); }
    }

    // "Refresh Table" logic (Filtered by Dropdown)
    async function updateDashboard() {
        const tableBody = document.getElementById('tableBody');
        const facility = document.getElementById('facilitySelect').value;
        const dataset = "facility-nuclear-outages";
        
        try {
            let url = `${API_BASE}/data?dataset=${dataset}&limit=100&facility_id=${facility}`;
            const response = await fetch(url);
            const data = await response.json();
            
            tableBody.innerHTML = ''; 
            if (data.length === 0) {
                tableBody.innerHTML = '<tr><td colspan="3" style="text-align:center">No records found.</td></tr>';
                return;
            }

            let rowsHtml = '';
            data.forEach(row => {
                rowsHtml += `<tr><td>${row.period}</td><td>${row.plant_name || 'N/A'}</td><td>${parseFloat(row.outage).toLocaleString()}</td></tr>`;
            });
            tableBody.innerHTML = rowsHtml;
        } catch (err) { console.error("Data retrieval failed:", err); }
    }

    //Runs everything when page loads
    window.onload = () => {
        loadMetadata();
        updateDashboard();
    };
</script>
